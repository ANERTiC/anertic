name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      service:
        description: "Service to deploy"
        required: true
        type: choice
        options:
          - all
          - api
          - ocpp
          - worker
          - ingester
          - web
      api_url:
        description: "VITE_API_URL for web build"
        required: false
        default: "https://api.anertic.com"

env:
  GIT_REV: ${{ github.sha }}
  IMAGE_BASE: ghcr.io/anertic/anertic
  DEPLOY_API: https://console.nortezh.com/api/deployment.deploy

jobs:
  changes:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      ocpp: ${{ steps.filter.outputs.ocpp }}
      worker: ${{ steps.filter.outputs.worker }}
      ingester: ${{ steps.filter.outputs.ingester }}
      web: ${{ steps.filter.outputs.web }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'api/**'
              - 'cmd/api/**'
              - 'pkg/**'
              - 'schema/**'
              - 'go.mod'
              - 'go.sum'
              - 'build/api/**'
            ocpp:
              - 'cmd/ocpp/**'
              - 'ocpp/**'
              - 'pkg/**'
              - 'schema/**'
              - 'go.mod'
              - 'go.sum'
              - 'build/ocpp/**'
            worker:
              - 'cmd/worker/**'
              - 'pkg/**'
              - 'schema/**'
              - 'go.mod'
              - 'go.sum'
              - 'build/worker/**'
            ingester:
              - 'cmd/ingester/**'
              - 'pkg/**'
              - 'schema/**'
              - 'go.mod'
              - 'go.sum'
              - 'build/ingester/**'
            web:
              - 'web/app.anertic.com/**'

  deploy-api:
    needs: [changes]
    if: |
      always() && (
        (github.event_name == 'push' && needs.changes.outputs.api == 'true') ||
        (github.event_name == 'workflow_dispatch' && (inputs.service == 'api' || inputs.service == 'all'))
      )
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: build/api/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ env.IMAGE_BASE }}/api:${{ env.GIT_REV }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Deploy to staging
        run: |
          curl -sf -X POST "$DEPLOY_API" \
            -H "Content-Type: application/json" \
            -u "${{ secrets.NT_USER }}:${{ secrets.NT_PASS }}" \
            -d '{"image":"${{ env.IMAGE_BASE }}/api:${{ env.GIT_REV }}","project":"anertic","name":"staging-api","location":"olufy-0"}'

  deploy-ocpp:
    needs: [changes]
    if: |
      always() && (
        (github.event_name == 'push' && needs.changes.outputs.ocpp == 'true') ||
        (github.event_name == 'workflow_dispatch' && (inputs.service == 'ocpp' || inputs.service == 'all'))
      )
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: build/ocpp/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ env.IMAGE_BASE }}/ocpp:${{ env.GIT_REV }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Deploy to staging
        run: |
          curl -sf -X POST "$DEPLOY_API" \
            -H "Content-Type: application/json" \
            -u "${{ secrets.NT_USER }}:${{ secrets.NT_PASS }}" \
            -d '{"image":"${{ env.IMAGE_BASE }}/ocpp:${{ env.GIT_REV }}","project":"anertic","name":"staging-ocpp","location":"olufy-0"}'

  deploy-worker:
    needs: [changes]
    if: |
      always() && (
        (github.event_name == 'push' && needs.changes.outputs.worker == 'true') ||
        (github.event_name == 'workflow_dispatch' && (inputs.service == 'worker' || inputs.service == 'all'))
      )
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: build/worker/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ env.IMAGE_BASE }}/worker:${{ env.GIT_REV }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Deploy to staging
        run: |
          curl -sf -X POST "$DEPLOY_API" \
            -H "Content-Type: application/json" \
            -u "${{ secrets.NT_USER }}:${{ secrets.NT_PASS }}" \
            -d '{"image":"${{ env.IMAGE_BASE }}/worker:${{ env.GIT_REV }}","project":"anertic","name":"staging-worker","location":"olufy-0"}'

  deploy-ingester:
    needs: [changes]
    if: |
      always() && (
        (github.event_name == 'push' && needs.changes.outputs.ingester == 'true') ||
        (github.event_name == 'workflow_dispatch' && (inputs.service == 'ingester' || inputs.service == 'all'))
      )
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: build/ingester/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ env.IMAGE_BASE }}/ingester:${{ env.GIT_REV }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Deploy to staging
        run: |
          curl -sf -X POST "$DEPLOY_API" \
            -H "Content-Type: application/json" \
            -u "${{ secrets.NT_USER }}:${{ secrets.NT_PASS }}" \
            -d '{"image":"${{ env.IMAGE_BASE }}/ingester:${{ env.GIT_REV }}","project":"anertic","name":"staging-ingester","location":"olufy-0"}'

