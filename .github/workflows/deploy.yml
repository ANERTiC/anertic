name: Deploy

on:
  push:
    branches: [main]

env:
  GIT_REV: ${{ github.sha }}
  IMAGE_BASE: ghcr.io/anertic/anertic
  DEPLOY_API: https://console.nortezh.com/api/deployment.deploy

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      ocpp: ${{ steps.filter.outputs.ocpp }}
      worker: ${{ steps.filter.outputs.worker }}
      ingester: ${{ steps.filter.outputs.ingester }}
      web: ${{ steps.filter.outputs.web }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'cmd/api/**'
              - 'pkg/**'
              - 'go.mod'
              - 'go.sum'
              - 'build/api/**'
            ocpp:
              - 'cmd/ocpp/**'
              - 'ocpp/**'
              - 'pkg/**'
              - 'go.mod'
              - 'go.sum'
              - 'build/ocpp/**'
            worker:
              - 'cmd/worker/**'
              - 'pkg/**'
              - 'go.mod'
              - 'go.sum'
              - 'build/worker/**'
            ingester:
              - 'cmd/ingester/**'
              - 'pkg/**'
              - 'go.mod'
              - 'go.sum'
              - 'build/ingester/**'
            web:
              - 'web/app.anertic.com/**'

  deploy-api:
    needs: changes
    if: needs.changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: build/api/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ env.IMAGE_BASE }}/api:${{ env.GIT_REV }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Deploy to staging
        run: |
          curl -sf -X POST "$DEPLOY_API" \
            -H "Content-Type: application/json" \
            -u "${{ secrets.NT_USER }}:${{ secrets.NT_PASS }}" \
            -d '{"image":"${{ env.IMAGE_BASE }}/api:${{ env.GIT_REV }}","project":"anertic","name":"staging-api","location":"olufy-0"}'

  deploy-ocpp:
    needs: changes
    if: needs.changes.outputs.ocpp == 'true'
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: build/ocpp/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ env.IMAGE_BASE }}/ocpp:${{ env.GIT_REV }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Deploy to staging
        run: |
          curl -sf -X POST "$DEPLOY_API" \
            -H "Content-Type: application/json" \
            -u "${{ secrets.NT_USER }}:${{ secrets.NT_PASS }}" \
            -d '{"image":"${{ env.IMAGE_BASE }}/ocpp:${{ env.GIT_REV }}","project":"anertic","name":"staging-ocpp","location":"olufy-0"}'

  deploy-worker:
    needs: changes
    if: needs.changes.outputs.worker == 'true'
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: build/worker/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ env.IMAGE_BASE }}/worker:${{ env.GIT_REV }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Deploy to staging
        run: |
          curl -sf -X POST "$DEPLOY_API" \
            -H "Content-Type: application/json" \
            -u "${{ secrets.NT_USER }}:${{ secrets.NT_PASS }}" \
            -d '{"image":"${{ env.IMAGE_BASE }}/worker:${{ env.GIT_REV }}","project":"anertic","name":"staging-worker","location":"olufy-0"}'

  deploy-ingester:
    needs: changes
    if: needs.changes.outputs.ingester == 'true'
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: build/ingester/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ env.IMAGE_BASE }}/ingester:${{ env.GIT_REV }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Deploy to staging
        run: |
          curl -sf -X POST "$DEPLOY_API" \
            -H "Content-Type: application/json" \
            -u "${{ secrets.NT_USER }}:${{ secrets.NT_PASS }}" \
            -d '{"image":"${{ env.IMAGE_BASE }}/ingester:${{ env.GIT_REV }}","project":"anertic","name":"staging-ingester","location":"olufy-0"}'

  deploy-web:
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: web/app.anertic.com
          file: web/app.anertic.com/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ env.IMAGE_BASE }}/web:${{ env.GIT_REV }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Deploy to staging
        run: |
          curl -sf -X POST "$DEPLOY_API" \
            -H "Content-Type: application/json" \
            -u "${{ secrets.NT_USER }}:${{ secrets.NT_PASS }}" \
            -d '{"image":"${{ env.IMAGE_BASE }}/web:${{ env.GIT_REV }}","project":"anertic","name":"staging-web","location":"olufy-0"}'
