name: Deploy

on:
  push:
    branches: [main]

env:
  GIT_REV: ${{ github.sha }}
  IMAGE_BASE: ghcr.io/anertic/anertic
  DEPLOY_API: https://console.nortezh.com/api/deployment.deploy

jobs:
  deploy-api:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: build/api/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ env.IMAGE_BASE }}/api:${{ env.GIT_REV }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Deploy to staging
        run: |
          curl -sf -X POST "$DEPLOY_API" \
            -H "Content-Type: application/json" \
            -u "${{ secrets.NT_USER }}:${{ secrets.NT_PASS }}" \
            -d '{"image":"${{ env.IMAGE_BASE }}/api:${{ env.GIT_REV }}","project":"anertic","name":"staging-api","location":"olufy-0"}'

  deploy-ocpp:
